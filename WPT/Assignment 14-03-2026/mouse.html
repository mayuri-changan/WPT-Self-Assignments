<!-- Write a jQuery program to hide all headings on a page when they are clicked. o Also
find the position of the mouse pointer relative to the left and top edges of the
document -->

<html>
<head>
<title>Hide Headings and Mouse Position</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

    
    $("h1,h2,h3,h4,h5,h6").click(function(){
        $(this).hide();
    });

   
    $(document).mousemove(function(event){
        $("#pos").text("X: " + event.pageX + " Y: " + event.pageY);
    });

});
</script>

</head>

<body>

<h1>Heading 1</h1>
<h2>Heading 2</h2>
<h3>Heading 3</h3>

<p>Move the mouse on the page.</p>

<p id="pos">Mouse Position</p>

</body>
</html>
